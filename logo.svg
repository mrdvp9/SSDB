<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">

  <!-- === STAR COMPASS POINTS ONLY === -->
  <polygon points="150,8 128,88 172,88" fill="black"/>
  <polygon points="150,292 128,212 172,212" fill="black"/>
  <polygon points="8,150 88,128 88,172" fill="black"/>
  <polygon points="292,150 212,128 212,172" fill="black"/>

  <!-- White circle background behind chip -->
  <circle cx="150" cy="150" r="72" fill="white"/>

  <!-- === MICROCONTROLLER CHIP === -->
  <rect x="112" y="112" width="76" height="76" rx="5" ry="5" fill="black"/>
  <!-- IC notch marker -->
  <circle cx="117" cy="117" r="5" fill="white"/>
  <!-- Die window -->
  <rect x="121" y="121" width="58" height="58" rx="2" ry="2" fill="#dddddd"/>
  <rect x="121" y="121" width="58" height="58" rx="2" ry="2" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Circuit grid -->
  <line x1="131" y1="121" x2="131" y2="179" stroke="black" stroke-width="1"/>
  <line x1="141" y1="121" x2="141" y2="179" stroke="black" stroke-width="1"/>
  <line x1="150" y1="121" x2="150" y2="179" stroke="black" stroke-width="1"/>
  <line x1="159" y1="121" x2="159" y2="179" stroke="black" stroke-width="1"/>
  <line x1="169" y1="121" x2="169" y2="179" stroke="black" stroke-width="1"/>
  <line x1="121" y1="131" x2="179" y2="131" stroke="black" stroke-width="1"/>
  <line x1="121" y1="141" x2="179" y2="141" stroke="black" stroke-width="1"/>
  <line x1="121" y1="150" x2="179" y2="150" stroke="black" stroke-width="1"/>
  <line x1="121" y1="159" x2="179" y2="159" stroke="black" stroke-width="1"/>
  <line x1="121" y1="169" x2="179" y2="169" stroke="black" stroke-width="1"/>
  <!-- Central processor core -->
  <rect x="131" y="131" width="38" height="38" rx="1" fill="black"/>
  <rect x="134" y="134" width="32" height="32" rx="1" fill="white"/>
  <!-- TCJD label inside core -->
  <text x="150" y="154" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="9" font-weight="900" fill="black">TCJD</text>

  <!-- PINS Left -->
  <rect x="97"  y="122" width="15" height="5" rx="1.5" fill="black"/>
  <rect x="97"  y="133" width="15" height="5" rx="1.5" fill="black"/>
  <rect x="97"  y="144" width="15" height="5" rx="1.5" fill="black"/>
  <rect x="97"  y="155" width="15" height="5" rx="1.5" fill="black"/>
  <rect x="97"  y="166" width="15" height="5" rx="1.5" fill="black"/>

  <!-- PINS Right -->
  <rect x="188" y="122" width="15" height="5" rx="1.5" fill="black"/>
  <rect x="188" y="133" width="15" height="5" rx="1.5" fill="black"/>
  <rect x="188" y="144" width="15" height="5" rx="1.5" fill="black"/>
  <rect x="188" y="155" width="15" height="5" rx="1.5" fill="black"/>
  <rect x="188" y="166" width="15" height="5" rx="1.5" fill="black"/>

  <!-- PINS Top -->
  <rect x="122" y="97"  width="5" height="15" rx="1.5" fill="black"/>
  <rect x="133" y="97"  width="5" height="15" rx="1.5" fill="black"/>
  <rect x="144" y="97"  width="5" height="15" rx="1.5" fill="black"/>
  <rect x="155" y="97"  width="5" height="15" rx="1.5" fill="black"/>
  <rect x="166" y="97"  width="5" height="15" rx="1.5" fill="black"/>

  <!-- PINS Bottom -->
  <rect x="122" y="188" width="5" height="15" rx="1.5" fill="black"/>
  <rect x="133" y="188" width="5" height="15" rx="1.5" fill="black"/>
  <rect x="144" y="188" width="5" height="15" rx="1.5" fill="black"/>
  <rect x="155" y="188" width="5" height="15" rx="1.5" fill="black"/>
  <rect x="166" y="188" width="5" height="15" rx="1.5" fill="black"/>

</svg>
